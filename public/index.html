<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAMY Avocats — Chrono</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0e0c;--surface:#161412;--surface2:#1e1b18;--surface3:#252119;
  --border:#2e2a24;--border2:#3a3530;
  --gold:#c9a84c;--gold2:#e8cc80;--gold-dim:rgba(201,168,76,.13);--gold-glow:rgba(201,168,76,.07);
  --rust:#a04030;--rust-dim:rgba(160,64,48,.18);
  --sage:#4a7a44;--sage-dim:rgba(74,122,68,.18);
  --amber:#c87820;--amber-dim:rgba(200,120,32,.18);
  --urgent:#c0392b;--urgent-dim:rgba(192,57,43,.18);
  --warning:#e67e22;--warning-dim:rgba(230,126,34,.18);
  --info:#2980b9;--info-dim:rgba(41,128,185,.18);
  --purple:#8e44ad;--purple-dim:rgba(142,68,173,.15);
  --text:#e8e0d0;--text2:#a09880;--text3:#6a6050;
  --r:4px;--ease:.2s ease;
}
body.light{
  --bg:#f5f0e8;--surface:#ffffff;--surface2:#f0ebe0;--surface3:#e8e0d0;
  --border:#ddd5c5;--border2:#ccc0a8;
  --gold:#9a7a2c;--gold2:#b89040;--gold-dim:rgba(154,122,44,.12);--gold-glow:rgba(154,122,44,.06);
  --rust:#8a3020;--rust-dim:rgba(138,48,32,.12);
  --sage:#3a6a34;--sage-dim:rgba(58,106,52,.12);
  --amber:#b06818;--amber-dim:rgba(176,104,24,.12);
  --urgent:#b03020;--urgent-dim:rgba(176,48,32,.12);
  --warning:#c06818;--warning-dim:rgba(192,104,24,.12);
  --info:#1a6090;--info-dim:rgba(26,96,144,.12);
  --purple:#6c3483;--purple-dim:rgba(108,52,131,.12);
  --text:#1a1410;--text2:#5a4e3a;--text3:#9a8870;
}
body.light .sidebar{box-shadow:2px 0 12px rgba(0,0,0,.08)}
body.light .topbar{background:rgba(245,240,232,.95)}
body.light input,body.light textarea,body.light select{background:var(--surface);border-color:var(--border2);color:var(--text)}
body.light ::-webkit-scrollbar-track{background:var(--surface2)}
body.light ::-webkit-scrollbar-thumb{background:var(--border2)}
.theme-toggle{display:flex;align-items:center;gap:.5rem;cursor:pointer;user-select:none;padding:.28rem .65rem;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);transition:all var(--ease)}
.theme-toggle:hover{border-color:var(--gold)}
.theme-label{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--text3);transition:color var(--ease);white-space:nowrap}
.theme-track{width:32px;height:18px;border-radius:9px;background:var(--surface3);border:1px solid var(--border2);position:relative;transition:background var(--ease);flex-shrink:0}
.theme-track.on{background:var(--gold);border-color:var(--gold)}
.theme-knob{position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--text3);transition:all .2s ease;pointer-events:none}
.theme-track.on .theme-knob{transform:translateX(14px);background:white}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;overflow-x:hidden;transition:background .3s,color .3s}

.role-switcher{position:fixed;top:12px;right:16px;z-index:1000;display:flex;gap:.4rem;background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:.3rem .4rem}
.role-btn{padding:.3rem .9rem;border-radius:16px;font-size:.72rem;font-family:'JetBrains Mono',monospace;cursor:pointer;border:none;transition:all var(--ease);color:var(--text3);background:transparent;letter-spacing:.04em}
.role-btn.active{background:var(--gold-dim);color:var(--gold);font-weight:500}
.role-label{font-size:.62rem;color:var(--text3);font-family:'JetBrains Mono',monospace;padding:.3rem .6rem;display:flex;align-items:center}

.app{display:flex;min-height:100vh}
#mainApp[style*="display:none"]{display:none!important}
.sidebar{width:224px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50}
.sidebar-logo{padding:1.4rem;border-bottom:1px solid var(--border)}
.logo-name{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:600;color:var(--gold);line-height:1}
.logo-tag{font-family:'JetBrains Mono',monospace;font-size:.57rem;color:var(--text3);letter-spacing:.18em;text-transform:uppercase;margin-top:3px}
.user-pill{margin:.7rem .5rem;padding:.65rem .9rem;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);display:flex;align-items:center;gap:.6rem}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(201,168,76,.25);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:.9rem;color:var(--gold);flex-shrink:0;font-weight:600}
.user-info{flex:1;min-width:0}
.user-name{font-size:.78rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--text3);margin-top:1px}
.user-role.admin{color:var(--gold)}
nav{padding:.8rem .5rem;flex:1;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-sec{font-family:'JetBrains Mono',monospace;font-size:.54rem;color:var(--text3);letter-spacing:.2em;text-transform:uppercase;padding:.9rem .8rem .35rem}
.nav-item{display:flex;align-items:center;gap:.65rem;padding:.58rem .8rem;border-radius:var(--r);cursor:pointer;color:var(--text2);font-size:.83rem;transition:all var(--ease);border:none;background:none;width:100%;text-align:left;position:relative;font-family:'Outfit',sans-serif}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--gold-dim);color:var(--gold);font-weight:500}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-badge{position:absolute;right:.7rem;top:50%;transform:translateY(-50%);background:var(--urgent);color:white;font-size:.58rem;font-weight:700;font-family:'JetBrains Mono',monospace;padding:.1rem .38rem;border-radius:10px;min-width:18px;text-align:center}
.nav-admin{display:none}

.content{margin-left:224px;flex:1;min-height:100vh}
.topbar{position:sticky;top:0;z-index:40;background:rgba(15,14,12,.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.85rem 2rem;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:1.28rem;font-weight:500;color:var(--text)}
.topbar-sub{font-size:.7rem;color:var(--text3);margin-top:1px;font-family:'JetBrains Mono',monospace}
.topbar-right{display:flex;align-items:center;gap:.7rem}
.admin-pill{padding:.25rem .8rem;background:var(--gold-dim);border:1px solid rgba(201,168,76,.2);border-radius:20px;font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--gold)}

.page{display:none;padding:1.8rem 2rem;max-width:1060px;animation:fadeIn .2s ease}
.page.active{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem;position:relative;overflow:hidden}
.card-accent::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold))}

/* STATS */
.stats-row{display:grid;gap:.9rem;margin-bottom:1.3rem}
.stats-4{grid-template-columns:repeat(4,1fr)}.stats-3{grid-template-columns:repeat(3,1fr)}.stats-2{grid-template-columns:repeat(2,1fr)}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.1rem 1.3rem}
.stat-lbl{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--text3);letter-spacing:.15em;text-transform:uppercase;margin-bottom:.35rem}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:600;color:var(--gold);line-height:1}
.stat-val.alert{color:var(--urgent)}.stat-val.ok{color:var(--sage)}.stat-val.warn{color:var(--warning)}
.stat-sub{font-size:.7rem;color:var(--text3);margin-top:.25rem}
.stat-trend{font-size:.68rem;margin-top:.3rem;font-family:'JetBrains Mono',monospace}
.stat-trend.up{color:#6ab864}.stat-trend.down{color:#e06050}

.chart-title{font-size:.72rem;color:var(--text2);font-weight:500;margin-bottom:.9rem;font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.08em}
.bar-chart{display:flex;flex-direction:column;gap:.55rem}
.bar-row{display:flex;align-items:center;gap:.7rem}
.bar-lbl{width:100px;font-size:.72rem;color:var(--text2);text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:18px;background:var(--surface2);border-radius:2px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:2px;min-width:4px;position:relative}
.bar-fill.gold{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.bar-fill.sage{background:linear-gradient(90deg,var(--sage),#6ab864)}
.bar-fill.rust{background:linear-gradient(90deg,var(--rust),#e06050)}
.bar-fill.info{background:linear-gradient(90deg,var(--info),#5090d0)}
.bar-val{position:absolute;right:5px;top:50%;transform:translateY(-50%);font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--bg);font-weight:500;white-space:nowrap}
.bar-val.out{right:auto;left:calc(100% + 5px);color:var(--text3)}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.dash-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1rem}

/* RENTABILITE TABLE */
.rent-table{width:100%;border-collapse:collapse}
.rent-table th{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;padding:.6rem .8rem;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.rent-table th.right{text-align:right}
.rent-table td{padding:.7rem .8rem;border-bottom:1px solid var(--border);font-size:.82rem;color:var(--text)}
.rent-table td.right{text-align:right;font-family:'JetBrains Mono',monospace;font-size:.78rem}
.rent-table td.mono{font-family:'JetBrains Mono',monospace;font-size:.78rem}
.rent-table tr:hover td{background:var(--surface2)}
.rent-table tr:last-child td{border-bottom:none}
.rent-bar{height:6px;border-radius:3px;margin-top:3px}
.rent-pct-cell{min-width:120px}
.pct-bar-wrap{display:flex;align-items:center;gap:.5rem}
.pct-bar-track{flex:1;height:5px;background:var(--surface3);border-radius:3px;overflow:hidden}
.pct-bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
.pct-lbl{font-family:'JetBrains Mono',monospace;font-size:.65rem;min-width:38px;text-align:right}
.status-pill{font-family:'JetBrains Mono',monospace;font-size:.58rem;padding:.12rem .45rem;border-radius:3px;white-space:nowrap}
.sp-ok{background:var(--sage-dim);color:#6ab864}
.sp-warn{background:var(--warning-dim);color:#e09040}
.sp-bad{background:var(--urgent-dim);color:#e06050}

/* FINANCIER TABS */
.fin-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:1.3rem}
.fin-tab{padding:.7rem 1.2rem;font-size:.82rem;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all var(--ease);font-family:'Outfit',sans-serif}
.fin-tab.active{color:var(--gold);border-bottom-color:var(--gold);font-weight:500}
.fin-tab:hover{color:var(--text2)}

/* MINI SPARKLINE */
.sparkline-wrap{display:flex;align-items:flex-end;gap:2px;height:28px}
.spark-bar{background:var(--gold-dim);border-radius:2px 2px 0 0;flex:1;transition:background var(--ease);min-width:4px}
.spark-bar:hover{background:var(--gold)}
.spark-bar.active{background:var(--gold)}

/* ALERT STRIP */
.alert-strip{display:flex;flex-direction:column;gap:.5rem}
.alert-item{display:flex;align-items:center;gap:.8rem;padding:.7rem .9rem;border-radius:var(--r);border:1px solid}
.alert-item.urg{background:var(--urgent-dim);border-color:rgba(192,57,43,.3)}
.alert-item.warn{background:var(--warning-dim);border-color:rgba(230,126,34,.25)}
.alert-item.norm{background:var(--info-dim);border-color:rgba(41,128,185,.2)}
.alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.alert-dot.urg{background:var(--urgent)}.alert-dot.warn{background:var(--warning)}.alert-dot.norm{background:var(--info)}
.alert-body{flex:1;min-width:0}
.alert-title{font-size:.82rem;font-weight:500;color:var(--text)}
.alert-meta{font-size:.7rem;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:1px}
.alert-days{font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600;white-space:nowrap}
.alert-days.urg{color:var(--urgent)}.alert-days.warn{color:var(--warning)}.alert-days.norm{color:var(--info)}

/* NOTIFS */
.notif-layout{display:grid;grid-template-columns:1fr 340px;gap:1.2rem;align-items:start}
.notif-feed{display:flex;flex-direction:column;gap:.6rem}
.notif-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.9rem 1.1rem;display:flex;align-items:flex-start;gap:.9rem;transition:border-color var(--ease);position:relative}
.notif-item:hover{border-color:var(--border2)}
.notif-item.unread{border-left:3px solid var(--gold)}
.notif-item.unread::after{content:'';position:absolute;top:.8rem;right:.8rem;width:6px;height:6px;border-radius:50%;background:var(--gold)}
.notif-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.9rem}
.ni-urgent{background:var(--urgent-dim)}
.ni-warn{background:var(--warning-dim)}
.ni-info{background:var(--info-dim)}
.ni-ok{background:var(--sage-dim)}
.ni-gold{background:var(--gold-dim)}
.notif-body{flex:1;min-width:0}
.notif-title{font-size:.84rem;font-weight:500;color:var(--text);margin-bottom:.2rem;line-height:1.3}
.notif-meta{font-size:.72rem;color:var(--text3);font-family:'JetBrains Mono',monospace;display:flex;flex-wrap:wrap;gap:.3rem .7rem;margin-top:.15rem}
.notif-time{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--text3);white-space:nowrap;margin-top:.25rem}
.notif-action{margin-top:.5rem}
.nbtn-sm{padding:.28rem .7rem;border-radius:3px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-family:'Outfit',sans-serif;font-size:.72rem;cursor:pointer;transition:all var(--ease)}
.nbtn-sm:hover{border-color:var(--gold);color:var(--gold)}
.notif-filters{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem}
.nf{padding:.27rem .7rem;border:1px solid var(--border2);border-radius:20px;font-size:.71rem;background:var(--surface2);color:var(--text3);cursor:pointer;transition:all var(--ease)}
.nf.active{background:var(--gold-dim);color:var(--gold);border-color:var(--gold)}

/* SETTINGS PANEL */
.settings-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.sp-head{padding:1rem 1.2rem;border-bottom:1px solid var(--border);font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--text);font-weight:500}
.sp-section{padding:.8rem 1.2rem;border-bottom:1px solid var(--border)}
.sp-section-title{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--text3);letter-spacing:.15em;text-transform:uppercase;margin-bottom:.7rem}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:.4rem 0;gap:.8rem}
.toggle-label{font-size:.8rem;color:var(--text2);flex:1;line-height:1.4}
.toggle-sub{font-size:.68rem;color:var(--text3);margin-top:1px}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--surface3);border-radius:10px;cursor:pointer;transition:background .2s;border:1px solid var(--border2)}
.toggle input:checked + .toggle-track{background:var(--sage);border-color:var(--sage)}
.toggle-knob{position:absolute;top:3px;left:3px;width:12px;height:12px;border-radius:50%;background:var(--text3);transition:transform .2s}
.toggle input:checked ~ .toggle-knob{transform:translateX(16px);background:white}
.sp-input-row{margin-top:.5rem}
.sp-input-row input{border:1px solid var(--border2);border-radius:var(--r);padding:.5rem .75rem;font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--text);background:var(--surface2);outline:none;width:100%;transition:border-color var(--ease)}
.sp-input-row input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
.sp-hint{font-size:.65rem;color:var(--text3);font-style:italic;margin-top:.3rem}
.btn-save-settings{display:flex;align-items:center;justify-content:center;padding:.7rem;background:var(--gold);color:var(--bg);border:none;border-radius:var(--r);font-family:'Outfit',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;width:calc(100% - 2.4rem);margin:1rem 1.2rem;transition:all var(--ease)}
.btn-save-settings:hover{background:var(--gold2)}

/* SAISIE */
.saisie-layout{display:grid;grid-template-columns:1fr 300px;gap:1.2rem;align-items:start}
.voice-card{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:1.3rem;margin-bottom:1.3rem;position:relative;overflow:hidden}
.voice-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--rust))}
.voice-head{display:flex;align-items:center;gap:.7rem;margin-bottom:.6rem}
.voice-ttl{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:500;color:var(--text)}
.voice-hint{font-size:.7rem;color:var(--text3);font-style:italic}
.voice-eg{font-family:'JetBrains Mono',monospace;font-size:.67rem;color:var(--gold);background:var(--gold-glow);border:1px solid rgba(201,168,76,.14);border-radius:var(--r);padding:.65rem .85rem;margin-bottom:.9rem;line-height:1.8}
.mic-btn{display:inline-flex;align-items:center;gap:.55rem;padding:.65rem 1.3rem;background:var(--gold);color:var(--bg);border:none;border-radius:var(--r);font-family:'Outfit',sans-serif;font-size:.81rem;font-weight:600;cursor:pointer;transition:all var(--ease)}
.mic-btn:hover{background:var(--gold2)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.95rem}
.fg{display:flex;flex-direction:column;gap:.32rem}
.fg.full{grid-column:1/-1}
.flbl{font-family:'JetBrains Mono',monospace;font-size:.59rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
input[type=text],input[type=number],input[type=date],input[type=email],textarea,select{border:1px solid var(--border2);border-radius:var(--r);padding:.63rem .82rem;font-family:'JetBrains Mono',monospace;font-size:.83rem;color:var(--text);background:var(--surface2);outline:none;width:100%;transition:border-color var(--ease)}
input:focus,textarea:focus,select:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
textarea{resize:vertical;min-height:78px;font-family:'Outfit',sans-serif;font-size:.83rem;line-height:1.6}
.hint{font-size:.63rem;color:var(--text3);font-style:italic}
.calc-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface3);border:1px solid var(--border);border-radius:var(--r);padding:.85rem 1.05rem}
.calc-lbl{font-size:.7rem;color:var(--text3)}.calc-sub{font-size:.62rem;color:var(--text3);margin-top:1px}
.calc-amt{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:600;color:var(--gold)}
.btn-submit{display:flex;align-items:center;justify-content:center;gap:.55rem;padding:.88rem 2rem;background:var(--gold);color:var(--bg);border:none;border-radius:var(--r);font-family:'Outfit',sans-serif;font-size:.86rem;font-weight:600;cursor:pointer;transition:all var(--ease);width:100%;margin-top:1.1rem}
.btn-submit:hover{background:var(--gold2);transform:translateY(-1px)}

/* TIMER */
.timer-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);position:relative;overflow:hidden}
.timer-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--rust),var(--urgent))}
.timer-panel-head{padding:1rem 1.2rem;border-bottom:1px solid var(--border)}
.timer-panel-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:500;color:var(--text);margin-bottom:.2rem}
.timer-panel-sub{font-size:.7rem;color:var(--text3);font-style:italic}
.timer-body{padding:1.2rem}

const SUPABASE_URL   = 'https://fgitbzgeaupowchsmlju.supabase.co'; // ← ÉTAPE 4 : remplacez VOTRE_PROJECT_ID
const SUPABASE_ANON  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnaXRiemdlYXVwb3djaHNtbGp1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNTYwOTIsImV4cCI6MjA4OTgzMjA5Mn0.tbfkEDuVJtj6VcedDCgEUUExkzEH6CkBAUZWGZCNGm8';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
var currentUser = null, currentProfile = null;
var entries=[], echeances=[], allProfiles=[];
var isAdmin = false;
var calDate = new Date(), selectedDay = null, echFilter = 'all';
var editingEchId = null, editingEntryId = null, deletingId = null, deletingType = null;
var isRecording = false, recognition = null;

var typeLabels = {judiciaire:'⚖️ Audience',depot:'📄 Dépôt',prescription:'⏰ Prescription',reponse:'✉️ Réponse',reunion:'👥 Réunion',autre:'📌 Autre'};


// ── AUTH FUNCTIONS ───────────────────────────────────
async function signIn() {
  var email = document.getElementById('authEmail').value.trim();
  var pass  = document.getElementById('authPass').value;
  var errEl = document.getElementById('authErr');
  if (errEl) errEl.classList.remove('show');
  if (!email || !pass) { showAuthErr('Courriel et mot de passe requis.'); return; }
  var { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { showAuthErr('Identifiants incorrects. Vérifiez votre courriel et mot de passe.'); }
}

async function signOut() {
  await sb.auth.signOut();
}

function showAuthErr(msg) {
  var el = document.getElementById('authErr');
  if (el) { el.textContent = msg; el.classList.add('show'); }
}

async function resetPassword() {
  var email = document.getElementById('authEmail').value.trim();
  if (!email) { showAuthErr('Entrez votre courriel.'); return; }
  var { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
  if (error) { showAuthErr(error.message); }
  else { showAuthErr('Courriel envoyé. Vérifiez votre boîte de réception.'); }
}

function switchAuthTab(tab, btn) {
  document.querySelectorAll('.auth-tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  var lf = document.getElementById('loginForm');
  var rf = document.getElementById('resetForm');
  if (lf) lf.style.display = tab === 'login' ? '' : 'none';
  if (rf) rf.style.display = tab === 'reset' ? '' : 'none';
}

// ══════════════════════════════════════════════
// BOOT — Auth state listener
// ══════════════════════════════════════════════
sb.auth.onAuthStateChange(async (event, session) => {
  try {
    if (session && session.user) {
      currentUser = session.user;
      await loadProfile();
      hideLoading();
      showApp();
    } else {
      currentUser = null; currentProfile = null; isAdmin = false;
      hideLoading();
      showAuth();
    }
  } catch(err) {
    console.error('Auth state error:', err);
    hideLoading();
    showAuth();
  }
});

async function loadProfile() {
  try {
    var { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    currentProfile = data;
    isAdmin = data && data.role === 'admin';
    renderUserPill();
    applyRoleUI();
  } catch(e) {
    console.warn('Profile load error:', e);
    currentProfile = null;
    isAdmin = false;
  }
  try { await loadData(); } catch(e) { console.warn('loadData error:', e); }
  try { renderAll(); } catch(e) { console.warn('renderAll error:', e); }
}

function renderUserPill() {
  if (!currentProfile && !currentUser) return;
  var name = (currentProfile && currentProfile.full_name) ? currentProfile.full_name : currentUser.email;
  var avatar = document.getElementById('uAvatar');
  var uname  = document.getElementById('uName');
  var urole  = document.getElementById('uRole');
  var pill   = document.getElementById('adminPill');
  if (avatar) avatar.textContent = name.charAt(0).toUpperCase();
  if (uname)  uname.textContent  = name;
  if (urole)  { urole.textContent = isAdmin ? 'Administrateur' : 'Avocat'; urole.className = 'user-role' + (isAdmin ? ' admin' : ''); }
  if (pill)   pill.style.display = isAdmin ? '' : 'none';
  var taux = document.getElementById('f-taux');
  if (taux && currentProfile) { taux.value = currentProfile.taux_defaut || ''; }
}

function renderAll() {
  try { renderDashboard(); } catch(e) { console.error('renderDashboard error:', e); }
  var activePage = document.querySelector('.page.active');

function buildAccueilNav(){
  var backBtn = _accueilStep > 1
    ? `<button onclick="accueilStep(${_accueilStep-1})" style="padding:.72rem 1.4rem;background:var(--surface2);color:var(--text2);border:1px solid var(--border2);border-radius:var(--r);font-family:'Outfit',sans-serif;font-size:.83rem;font-weight:500;cursor:pointer">← Retour</button>`
    : '<div></div>';
  var nextBtn = _accueilStep < 4
    ? `<button onclick="accueilNextStep()" style="padding:.72rem 1.6rem;background:var(--gold);color:var(--bg);border:none;border-radius:var(--r);font-family:'Outfit',sans-serif;font-size:.84rem;font-weight:600;cursor:pointer">Suivant →</button>`
    : `<button id="btnConfirmOpen" onclick="confirmDossierOpen()" style="display:flex;align-items:center;gap:.5rem;padding:.82rem 1.8rem;background:var(--gold);color:var(--bg);border:none;border-radius:var(--r);font-family:'Outfit',sans-serif;font-size:.86rem;font-weight:600;cursor:pointer">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>
        Confirmer l'ouverture du dossier

function bindAccueilEvents(){}

function accueilStep(n){ _accueilStep=n; renderAccueil(); window.scrollTo({top:0,behavior:'smooth'}); }
function accueilNextStep(){
  if(_accueilStep===1){
    if(_accueilData.clientExisting===null && !_accueilData.clientNom.trim()){
      toast('Sélectionnez un client existant ou saisissez un nom','warn'); return;
    }
  }
  if(_accueilStep===2){
    if(!_accueilData.domaine){ toast('Choisissez un domaine de droit','warn'); return; }
  }
  if(_accueilStep===2){
    // Simulate conflict check animation on step 3
    _accueilStep=3; renderAccueil();
    var anim=document.getElementById('conflitSearchAnim');
    var res=document.getElementById('conflitResults');
    if(anim&&res){
      res.style.display='none'; anim.style.display='block';
      var msgs=['Recherche dans 159 dossiers…','Analyse des parties adverses…','Vérification des tiers liés…','Recherche phonétique…','Compilation des résultats…'];
      var i=0; var iv=setInterval(()=>{
        var el=document.getElementById('conflitSearchMsg');
        if(el&&i<msgs.length) el.textContent=msgs[i++];
      },500);
      setTimeout(()=>{ clearInterval(iv); anim.style.display='none'; res.style.display='block'; toast('⚠ 2 conflits détectés — action requise','err'); },2800);
    }
    window.scrollTo({top:0,behavior:'smooth'}); return;
  }
  _accueilStep++; renderAccueil(); window.scrollTo({top:0,behavior:'smooth'});
}
function confirmDossierOpen(){
  var btn=document.getElementById('btnConfirmOpen'); if(!btn) return;
  btn.innerHTML='⏳ Ouverture en cours…'; btn.style.background='var(--amber)'; btn.style.pointerEvents='none';
  setTimeout(()=>{
    btn.innerHTML='✓ Dossier ouvert !'; btn.style.background='var(--sage)';
    toast(`✓ Dossier ${_accueilData.dossierNum} ouvert — 6 actions déclenchées`,'ok');
    setTimeout(()=>{ _accueilStep=1; renderAccueil(); },2000);
  },2000);
}
function selectExistingClient(i){
  _accueilData.clientExisting=i;
  document.querySelectorAll('[id^="eclient-"]').forEach((el,j)=>{
    el.style.borderColor=j===i?'var(--gold)':'var(--border)';
    el.querySelector('div:nth-child(2) div').style.color=j===i?'var(--gold)':'var(--text)';
  });
  toast('Client sélectionné : '+_existingClients[i].name,'ok');
}
function filterClients(val){
  document.querySelectorAll('[id^="eclient-"]').forEach((el,i)=>{
    el.style.display=(!val||_existingClients[i].name.toLowerCase().includes(val.toLowerCase()))?'flex':'none';
  });
}
function toggleNewClientForm(){
  var f=document.getElementById('newClientForm');
  var l=document.getElementById('existingClientsList');
  if(f&&l){ var show=f.style.display==='none'; f.style.display=show?'block':'none'; if(show) _accueilData.clientExisting=null; }
}

          <label style="position:relative;width:34px;height:19px;flex-shrink:0;cursor:${disabled?'not-allowed':'pointer'}">
            <input type="checkbox" ${checked?'checked':''} ${disabled?'disabled':''} onchange="toast('Paramètre mis à jour','ok')" style="opacity:0;width:0;height:0;position:absolute">
            <div style="position:absolute;inset:0;background:${checked?'var(--sage)':'var(--surface3)'};border-radius:9px;border:1px solid ${checked?'var(--sage)':'var(--border2)'};transition:background .2s"></div>
            <div style="position:absolute;top:3px;left:${checked?'17px':'3px'};width:11px;height:11px;border-radius:50%;background:${checked?'white':'var(--text3)'};transition:left .2s"></div>
          </label>
        </div>`).join('')}
      </div>`).join('')}
    </div>
    <div style="margin-top:1rem;padding:.9rem 1.1rem;background:var(--gold-glow);border:1px solid rgba(201,168,76,.2);border-radius:var(--r);display:flex;gap:.7rem;align-items:flex-start">
      <div style="font-size:1.1rem;flex-shrink:0">⚖️</div>
      <div>
        <div style="font-size:.84rem;font-weight:500;color:var(--gold);margin-bottom:.3rem">Obligations déontologiques — Barreau du Québec</div>
        <div style="font-size:.78rem;color:var(--text2);line-height:1.6">L'article 62 du Code de déontologie des avocats oblige chaque avocat à vérifier l'absence de conflit d'intérêts avant d'accepter un mandat. Le cabinet doit conserver une preuve de cette vérification.</div>
      </div>
    </div>`;

  var content = {verification:verificationHTML, registre:registreHTML, parametres:parametresHTML}[_conflitTab];

  document.getElementById('page-conflits').innerHTML=`<div style="max-width:980px">
    <div style="display:flex;border-bottom:1px solid var(--border);margin-bottom:1.3rem;background:var(--surface);border-radius:var(--r) var(--r) 0 0;overflow:hidden">
      ${tabsHTML}
    </div>
    ${content}
  </div>`;
}

function setConflitTab(t){ _conflitTab=t; renderConflits(); }
function addConflitParty(){
  var n=document.getElementById('conflitPartyName');
  var r=document.getElementById('conflitPartyRole');
  if(!n||!n.value.trim()){toast('Entrez un nom de partie','info');return;}
  _conflitParties.push({name:n.value.trim(),role:r.value});
  n.value=''; _conflitSearchDone=false; renderConflits();
  toast(n.value||'Partie ajoutée','ok');
}
function removeConflitParty(i){
  _conflitParties.splice(i,1); _conflitSearchDone=false; renderConflits();
}
function lancerVerification(){
  var btn=document.getElementById('btnLancerVerif'); if(!btn)return;
  btn.style.background='var(--amber)'; btn.style.pointerEvents='none';
  var phases=['Recherche dans 159 dossiers…','Analyse des parties adverses…','Vérification des tiers liés…','Correspondances phonétiques…','Compilation des résultats…'];
  var i=0;
  btn.innerHTML='⟳ '+phases[0];
  var iv=setInterval(()=>{ if(++i<phases.length) btn.innerHTML='⟳ '+phases[i]; },600);
  setTimeout(()=>{
    clearInterval(iv); _conflitSearchDone=true; _conflitTab='verification';
    renderConflits();
    toast('⚠ 2 conflits détectés — action requise','err');
  },3200);
}

// ── NOTES DE DOSSIER ──────────────────────
function renderNotes(){
  var NOTES_DATA={
    '22006-001':{avocat:'Me Vaillancourt',contenu:'**Résumé :** Litige contractuel entre Industries Saguenay inc. et Groupe Beauchamp inc.\n\n**20 mars 2026** — Appel avec M. Lapointe. Accepte l\'offre de 45 000$ avec clause de confidentialité. Contre-offre attendue avant le 28 mars.\n\n**Points à surveiller :**\n• Clause de non-divulgation — rédiger\n• Appeler client lundi AM'},
    '22008-003':{avocat:'Me Tremblay',contenu:'**Dossier Beaupré c. Succession Morin**\nLitige immobilier — vices cachés.\n\n**21 mars** — Client veut audience rapide.\n**Prochaine étape :** Demande de mise au rôle accéléré avant le 22 mars (DÉLAI ABSOLU).'},
    '21003-007':{avocat:'Me Bergeron',contenu:'Droit de la famille — partage de patrimoine.\n\n**Audience 25 mars :** Témoins confirmés. Représentations écrites prêtes à déposer.'},
    '23001-002':{avocat:'Me Côté',contenu:'Contrat de services — Beaumont Distribution inc.\nAttente retour client sur clause 8.3 (exclusivité).'},
    '23004-001':{avocat:'Me Vaillancourt',contenu:'Nouveau dossier — Technologies Nordiques inc.\nAcquisition minoritaire dans startup IA.\n\nPoints à vérifier : due diligence, pacte d\'actionnaires, représentations et garanties.'},
  };
  var myDos=isAdmin?Object.keys(NOTES_DATA):Object.keys(NOTES_DATA).filter(d=>NOTES_DATA[d].avocat===allProfiles?.find(a=>a.id===currentUser?.id)?.name);
  var activeDos=myDos[0]||'22006-001';

  document.getElementById('page-notes').innerHTML=`<div style="display:grid;grid-template-columns:240px 1fr;gap:1.1rem;align-items:start;min-height:500px">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden">
      <div style="padding:.75rem 1rem;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--text3);letter-spacing:.12em;text-transform:uppercase">Dossiers</div>
      ${myDos.map(d=>{var n=NOTES_DATA[d];var preview=n.contenu.replace(/\*\*/g,'').split('\n')[0].slice(0,35);return `<div onclick="switchNote('${d}')" id="dnote-${d}" style="padding:.75rem 1rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;${d===activeDos?'background:var(--gold-glow);border-left:2px solid var(--gold)':''}" onmouseover="if('${d}'!==window._activeDos)this.style.background='var(--surface2)'" onmouseout="if('${d}'!==window._activeDos)this.style.background=''">
        <div style="font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:500;color:${d===activeDos?'var(--gold)':'var(--text2)'}">${d}</div>
        <div style="font-size:.68rem;color:var(--text3);margin-top:1px">${n.avocat.replace('Me ','')}</div>
        <div style="font-size:.7rem;color:var(--text3);margin-top:2px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${preview}…</div>
      </div>`;}).join('')}
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);display:flex;flex-direction:column;min-height:500px">
      <div style="padding:.9rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
        <span style="font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:500;color:var(--gold);background:var(--gold-glow);border:1px solid rgba(201,168,76,.15);padding:.22rem .55rem;border-radius:3px" id="noteTag">${activeDos}</span>
        <div style="display:flex;align-items:center;gap:.5rem">
          <span style="font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--sage);opacity:0;transition:opacity .3s" id="noteSavedLbl">✓ Sauvegardé</span>
          <button style="padding:.35rem .9rem;border-radius:var(--r);background:var(--gold);border:none;color:var(--bg);font-family:'Outfit',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer" onclick="saveNote()">Sauvegarder</button>
        </div>
      </div>
      <textarea id="noteArea" style="flex:1;border:none;background:transparent;color:var(--text);font-family:'Outfit',sans-serif;font-size:.87rem;line-height:1.75;padding:1.2rem 1.4rem;resize:none;outline:none;min-height:420px">${NOTES_DATA[activeDos]?.contenu||''}</textarea>
    </div>
  </div>`;
  window._activeDos=activeDos;
  window._notesData=NOTES_DATA;
}

window.switchNote=function(dos){
  if(window._notesData){
    var ta=document.getElementById('noteArea');
    if(ta&&window._activeDos)window._notesData[window._activeDos].contenu=ta.value;
    window._activeDos=dos;
    document.querySelectorAll('[id^="dnote-"]').forEach(el=>{
      var d=el.id.replace('dnote-','');
      el.style.background=d===dos?'var(--gold-glow)':'';
      el.style.borderLeft=d===dos?'2px solid var(--gold)':'';
      el.querySelector('div').style.color=d===dos?'var(--gold)':'var(--text2)';
    });
    var tag=document.getElementById('noteTag');
    if(tag)tag.textContent=dos;
    var ta2=document.getElementById('noteArea');
    if(ta2)ta2.value=window._notesData[dos]?.contenu||'';
  }
};

window.saveNote=function(){
  var ta=document.getElementById('noteArea');
  if(ta&&window._activeDos&&window._notesData)window._notesData[window._activeDos].contenu=ta.value;
  var lbl=document.getElementById('noteSavedLbl');
  if(lbl){lbl.style.opacity='1';setTimeout(()=>lbl.style.opacity='0',2000);}
  toast('✓ Note sauvegardée — '+window._activeDos,'ok');
};

// ── TOAST ─────────────────────────────────
function toast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type||'info')+' show';clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3500);}

// ── THÈME ─────────────────────────────────────────
function toggleTheme(){
  var isLight = document.body.classList.toggle('light');
  var track = document.getElementById('themeTrack');
  var label = document.getElementById('themeLabel');
  if(track) track.classList.toggle('on', isLight);
  if(label) label.textContent = isLight ? '☀️ Clair' : '🌙 Sombre';
  try { localStorage.setItem('chrono-theme', isLight ? 'light' : 'dark'); } catch(e){}
}

async function submitEntry(){
  var dossier=document.getElementById('f-dossier').value.trim(),minutes=parseInt(document.getElementById('f-minutes').value),taux=parseFloat(document.getElementById('f-taux').value),desc=document.getElementById('f-desc').value.trim(),date=document.getElementById('f-date').value;
  if(!dossier){toast('Numéro de dossier requis.','err');return;}if(!minutes||minutes<1){toast('Durée requise.','err');return;}if(!taux||taux<1){toast('Taux requis.','err');return;}if(!desc){toast('Description requise.','err');return;}
  var montant=parseFloat((minutes/60*taux).toFixed(2));
  var payload={user_id:currentUser.id,dossier,minutes,taux,montant,description:desc,date,juris_status:'pending'};
  var btn=document.getElementById('submitBtn');btn.classList.add('loading');btn.textContent='Sauvegarde…';
  var {data,error}=await sb.from('time_entries').insert(payload).select().single();
  if(error){toast('Erreur sauvegarde : '+error.message,'err');btn.classList.remove('loading');btn.innerHTML=submitBtnHTML();return;}
  btn.textContent='Envoi à Juris Évolution…';
  try{await sendToJuris(data);await sb.from('time_entries').update({juris_status:'synced'}).eq('id',data.id);toast('✓ '+dossier+' — '+minutes+' min — synchronisé','ok');}
  catch(x){await sb.from('time_entries').update({juris_status:'error'}).eq('id',data.id);toast('Sauvegardé. Erreur envoi Juris.','err');}
  resetForm();await loadData();renderHistory();renderDashboard();updateErrBtn();
  btn.classList.remove('loading');btn.innerHTML=submitBtnHTML();
}

function submitBtnHTML(){return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg> Enregistrer et envoyer à Juris Évolution';}
function resetForm(){['f-dossier','f-minutes','f-desc'].forEach(id=>document.getElementById(id).value='');document.getElementById('f-date').value=iso(new Date());document.getElementById('transcript').classList.remove('show');// calcUpdate removed}

async function sendToJuris(entry){
  // Décommentez pour la vraie intégration :
  // var r=await fetch('https://votre-instance.jurisevolution.com/api/v1/timeentries',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer VOTRE_TOKEN'},body:JSON.stringify({file_number:entry.dossier,duration_minutes:entry.minutes,hourly_rate:entry.taux,amount:entry.montant,description:entry.description,date:entry.date})});
  // if(!r.ok) throw new Error('HTTP '+r.status);
  await new Promise(r=>setTimeout(r,1000));
}

// ══════════════════════════════════════════════
// HISTORIQUE
// ══════════════════════════════════════════════


async function retrySyncErrors(){var errs=entries.filter(e=>e.juris_status==='error');var ok=0;for(var e of errs){try{await sendToJuris(e);await sb.from('time_entries').update({juris_status:'synced'}).eq('id',e.id);ok++;}catch(x){}}await loadData();renderHistory();updateErrBtn();toast(ok?'✓ '+ok+' synchronisé(s).':'Échec.',ok?'ok':'err');}
async function retrySingle(id){var e=entries.find(x=>x.id===id);if(!e)return;try{await sendToJuris(e);await sb.from('time_entries').update({juris_status:'synced'}).eq('id',id);toast('✓ Synchronisé.','ok');}catch(x){toast('Échec.','err');}await loadData();renderHistory();updateErrBtn();}
function updateErrBtn(){var n=entries.filter(e=>e.juris_status==='error').length;document.getElementById('errCount').textContent=n;document.getElementById('syncErrBtn').classList.toggle('hidden',n===0);}

function openEditEntry(id){var e=entries.find(x=>x.id===id);if(!e)return;editingEntryId=id;document.getElementById('e-dossier').value=e.dossier;document.getElementById('e-minutes').value=e.minutes;document.getElementById('e-taux').value=e.taux;document.getElementById('e-date').value=e.date;document.getElementById('e-desc').value=e.description;document.getElementById('editEntryModal').classList.add('show');}
async function saveEdit(){var e=entries.find(x=>x.id===editingEntryId);if(!e)return;var dossier=document.getElementById('e-dossier').value.trim()||e.dossier,minutes=parseInt(document.getElementById('e-minutes').value)||e.minutes,taux=parseFloat(document.getElementById('e-taux').value)||e.taux,date=document.getElementById('e-date').value||e.date,desc=document.getElementById('e-desc').value.trim()||e.description,montant=parseFloat((minutes/60*taux).toFixed(2));var{error}=await sb.from('time_entries').update({dossier,minutes,taux,montant,date,description:desc,juris_status:'pending'}).eq('id',editingEntryId);if(error){toast('Erreur.','err');return;}await loadData();renderHistory();renderDashboard();closeOverlay('editEntryModal');toast('Modifié — re-sync en attente.','warn');retrySingle(editingEntryId);}
function openDelEntry(id){deletingId=id;deletingType='entry';document.getElementById('delTitle').textContent="Supprimer cette entrée ?";document.getElementById('delMsg').textContent='Cette action est irréversible.';document.getElementById('delModal').classList.add('show');}
